name: ceedee-ripper
title: CeeDee Ripper
version: '1.0.0'
summary: Audio CD music ripper.
description: |

  CeeDee Ripper is a GTK4 and Libadwaita desktop app for extracting audio CDs.

  It detects inserted discs, looks up metadata, lets you choose which tracks to
  keep, and saves them as FLAC, MP3, WAV, or Ogg Vorbis files.

  CeeDee Ripper extracts audio from Audio CD's to these formats:

  -FLAC is an open, royalty-free audio codec that provides lossless compression,
   meaning the audio is reduced in size without any loss of quality when decoded.

  -MP3 is a coding format for digital audio using lossy data compression,
   defined by the MPEG-1 and MPEG-2 standards. It reduces file size by removing audio data considered less audible to human hearing.

  -WAV is a standard digital audio file format used for storing audio on Windows systems.
   It is based on the RIFF container and typically stores uncompressed PCM audio.
  
  -Vorbis is a free, open, patent-free audio compression format designed for lossy encoding.
   It is usually stored in the Ogg container and intended as an efficient alternative to proprietary formats like MP3.

# core24 (Ubuntu 24.04) ships glibc 2.39, which includes GLIBC_2.38 and GLIBC_2.39.
base: core24
grade: stable
confinement: strict
license: GPL-3.0-or-later
icon: resources/images/ceedee-ripper.png
website: https://github.com/odioski/CeeDee-Ripper
source-code: https://github.com/odioski/CeeDee-Ripper
issues: https://github.com/odioski/CeeDee-Ripper/issues
contact: https://github.com/odioski/CeeDee-Ripper/issues
donation: https://buymeacoffee.com/odioski

lint:
  ignore:
    - classic
    - library

parts: 
  ceedee-ripper:
    plugin: nil
    source: .

    override-build: |
      set -eux

      if [ ! -x "$CRAFT_PART_SRC/target/release/ceedee-ripper" ]; then
        echo "Missing prebuilt binary: target/release/ceedee-ripper"
        echo "Build it first with: cargo build --release"
        exit 1
      fi

      install -Dm755 "$CRAFT_PART_SRC/target/release/ceedee-ripper" \
        "$CRAFT_PART_INSTALL/bin/ceedee-ripper"
      install -Dm644 "$CRAFT_PART_SRC/resources/images/ceedee-ripper.png" \
        "$CRAFT_PART_INSTALL/usr/share/icons/hicolor/256x256/apps/ceedee-ripper.png"
      install -Dm644 "$CRAFT_PART_SRC/resources/ceedee-ripper.desktop" \
        "$CRAFT_PART_INSTALL/usr/share/applications/ceedee-ripper.desktop"

    stage-packages:
      # Core runtime
      - libc6
      - libadwaita-1-0
      - libgtk-4-1
      - libdiscid0
      - libglib2.0-0
      - glib-networking
      # GStreamer — only the three elements the pipeline uses:
      # cdparanoia ! wavenc ! filesink
      - libgstreamer1.0-0
      - libgstreamer-plugins-base1.0-0
      - gstreamer1.0-plugins-base
      - gstreamer1.0-plugins-good
      - gstreamer1.0-plugins-ugly
      - libcdparanoia0
      # CLI encoders (flac, lame, oggenc) called by ripper.rs
      - flac
      - lame
      - vorbis-tools
      # CLI rip fallback
      - cdparanoia
      # Audio backend
      - libpipewire-0.3-0
      - libpulse0
        

apps:  
  ceedee-ripper:
    extensions:
      - gnome
    command: bin/ceedee-ripper
    environment:
      GDK_BACKEND: x11,wayland
      GTK_MEDIA: none
      GST_PLUGIN_PATH: $SNAP/usr/lib/x86_64-linux-gnu/gstreamer-1.0
    plugs:
      - desktop
      - desktop-legacy
      - wayland
      - x11
      - opengl
      - removable-media
      - optical-drive
      - raw-usb
      - block-devices
      - network
    slots:
      - ceedee-ripper-dbus

slots:
  ceedee-ripper-dbus:
    interface: dbus
    bus: session

plugs:
  optical-drive:
    interface: optical-drive
    write: false
  raw-usb:
    interface: raw-usb
  block-devices:
    interface: block-devices
    name: snap.ceedee-ripper.ceedee-ripper

