name: ceedee-ripper
version: '1.0.0'
title: CeeDee Ripper
summary: Audio CD music ripper with multiple format support.
description: |
  CeeDee Ripper extracts audio from Audio CDs to multiple formats including
  FLAC, MP3, WAV, and Vorbis.

base: core22
confinement: strict
license: GPL-3.0-or-later

parts:
  ceedee-ripper:
    plugin: rust
    source: .
    rust-channel: "stable"
    build-packages:
      - build-essential
      - pkg-config
      - libgtk-4-dev
      - libadwaita-1-dev
      - libgstreamer1.0-dev
      - libgstreamer-plugins-base1.0-dev
      - libdbus-1-dev
      - libclang-dev

apps:
  ceedee-ripper:
    command: bin/ceedee-ripper
    plugs:
      - audio-record
      - removable-media
      - network
      - home
      - desktop